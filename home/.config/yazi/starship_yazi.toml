# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Don't print a new line at the start of the prompt
add_newline = false

# Color pallet for the prompt
palette = "everforest"

# Use custom format
format = """
$directory$c$custom$java$lua$python$rust$package$git_branch$battery$cmd_duration
"""

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10

# Directory indicator
[directory]
read_only = "ЁЯФТ"
style = "bold cyan"
read_only_style = "red"
truncation_length = 8
truncation_symbol = "тАж/"
format = "[$read_only]($read_only_style)[$path]($style) "
disabled = false

# C language settings
[c]
symbol = "юШЮ "
style = "blue bold"
format = "via [${symbol}${version}]($style) "

# C++ language settings
[custom.cpp]
detect_extensions = ['cpp', 'hpp']
symbol = "юШЭ "
style = "blue bold"
format = "via [${symbol}${output}]($style) "
command = "g++ --version | awk 'NR==1 {print $4}'"

# Java settings
[java]
symbol = "тШХ "
style = "red dimmed"
format = "via [${symbol}${version}]($style) "

# Lua language settings
[lua]
symbol = "ЁЯМЩ "
# style = "bright_yellow bold"
style = "peach bold"
format = "via [${symbol}Lua ${version}]($style) "

# Python settings
[python]
symbol = "ЁЯРН "
style = "yellow bold"
format = "via [${symbol}${version}]($style) "
python_binary = "python3"
# pyenv_version_name = true

# Rust language settings
[rust]
symbol = "ЁЯжА "
# style = "bright_red bold"
style = "maroon bold"
format = "via [${symbol}Rust ${version}]($style) "

# Package Version Config
[package]
symbol = "ЁЯОБ "
# style = "bright_yellow bold"
style = "peach bold"
format = "in [${symbol}$version]($style) "

# Package Version Config
[package]
symbol = "ЁЯОБ "
style = "peach bold"
format = "in [${symbol}$version]($style) "

# git settings
[git_branch]
symbol = "ЁЯМ▒ "
truncation_length = 4
truncation_symbol = ""

